<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 380 80" fill="none">
  <!-- Icon group (left side) -->
  <!-- Right arrow (black, top) -->
  <line x1="8" y1="10" x2="52" y2="10" stroke="#2C2C2C" stroke-width="4" stroke-linecap="round"/>
  <polyline points="44,5 52,10 44,15" stroke="#2C2C2C" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" fill="none"/>

  <!-- Dark gear -->
  <g transform="translate(22,42)">
    <path d="M0,-18 L4,-14 L8,-16 L11,-12 L9,-8 L13,-5 L13,0 L9,2 L9,6 L5,8 L2,6 L-2,8 L-5,6 L-5,2 L-9,0 L-9,-5 L-5,-8 L-5,-12 L-2,-15 Z" fill="#2C2C2C"/>
    <circle cx="0" cy="-4" r="6" fill="white"/>
  </g>

  <!-- Orange gear -->
  <g transform="translate(50,48)">
    <path d="M0,-18 L4,-14 L8,-16 L11,-12 L9,-8 L13,-5 L13,0 L9,2 L9,6 L5,8 L2,6 L-2,8 L-5,6 L-5,2 L-9,0 L-9,-5 L-5,-8 L-5,-12 L-2,-15 Z" fill="#E67E22"/>
    <circle cx="0" cy="-4" r="6" fill="white"/>
  </g>

  <!-- Left arrow (orange, bottom) -->
  <line x1="60" y1="72" x2="16" y2="72" stroke="#E67E22" stroke-width="4" stroke-linecap="round"/>
  <polyline points="24,67 16,72 24,77" stroke="#E67E22" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" fill="none"/>

  <!-- "trink" text (orange, rounded bold) -->
  <text x="82" y="52" font-family="Arial Rounded MT Bold, Arial, sans-serif" font-size="42" font-weight="900" fill="#E67E22" letter-spacing="-1">trink</text>

  <!-- "makina" text (dark, heavy) -->
  <text x="210" y="52" font-family="Georgia, 'Times New Roman', serif" font-size="42" font-weight="900" fill="#2C2C2C" letter-spacing="-1">makina</text>
</svg>
